<html>

<head>
    <meta charset='utf-8 ' />
    <title>Exemple estils vector ICGC i MapICGC GL JS</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <script src="https://eines.icgc.cat/recursos/mapicgc-gl-js/mapicgc-gl.js"></script>
    <link href="https://eines.icgc.cat/recursos/mapicgc-gl-js/mapicgc-gl.css" rel="stylesheet" />
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
            height: 100%
        }

        #menu {
            position: absolute;
            z-index: 1000;
            background: #fff;
            padding: 10px;
            font-family: 'Open Sans', sans-serif;
            top: 5px;
            left: 5px;
            border-radius: 7px;
            -webkit-box-shadow: 5px 5px 5px -5px rgba(0, 0, 0, 0.75);
            -moz-box-shadow: 5px 5px 5px -5px rgba(0, 0, 0, 0.75);
            box-shadow: 5px 5px 5px -5px rgba(0, 0, 0, 0.75);
        }
    </style>
</head>

<body>
    <div id='menu'>
        <input id='mapa-base-estandard' type='radio' name='rtoggle' value='mapa-base-estandard' checked='checked' />
        <label for='mapa-base-estandard'>Mapa estàndard</label><br />
        <input id='mapa-base-estandard-gris' type='radio' name='rtoggle' value='mapa-base-estandard-gris' />
        <label for='mapa-base-estandard-gris'>Mapa base gris</label><br />
        <input id='mapa-base-topografic' type='radio' name='rtoggle' value='mapa-base-topografic' />
        <label for='mapa-base-topografic'>Topogràfic</label><br />
        <input id='mapa-base-orto' type='radio' name='rtoggle' value='mapa-base-orto' />
        <label for='mapa-base-orto'>Ortofoto</label><br />
        <input id='mapa-base-orto-gris' type='radio' name='rtoggle' value='mapa-base-orto-gris' />
        <label for='mapa-base-orto-gris'>Ortofoto gris</label><br />
        <input id='mapa-base-orto-hibrida' type='radio' name='rtoggle' value='mapa-base-orto-hibrida' />
        <label for='mapa-base-orto-hibrida'>Orto híbrida</label>
    </div>

    <div id="map"></div>
    <script>

        async function initMap() {
            const data = await mapicgcgl.Config.getConfigICGC();
            const map = new mapicgcgl.Map({
                container: "map",
                style: data.Styles.TOPO,
                center: [2.1464, 41.306],
                zoom: 7.4,
                maxZoom: 19,
                hash: true,
                pitch: 0,
            });
            map.on("load", () => {
                map.addFullscreenControl()
                map.addNavigationControl()

                map.addGeolocateControl(
                    {
                        positionOptions: {
                            enableHighAccuracy: true,
                        },
                        trackUserLocation: true,
                    }
                );


            })
            const layerList = document.getElementById('menu');
            const inputs = layerList.getElementsByTagName('input');

            function switchLayer(layer) {
                const layerId = layer.target.id;
                map.setStyle('https://geoserveis.icgc.cat/styles/' + layerId + '.json');
            }

            for (let i = 0; i < inputs.length; i++) {
                inputs[i].onclick = switchLayer;
            }

        }
        initMap();


    </script>
</body>

</html>
